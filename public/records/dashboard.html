<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Records Dashboard</title>
  <style>
    :root{--bg:#0f172a;--panel:#1e293b;--line:#334155;--txt:#e2e8f0;--muted:#94a3b8;--ok:#10b981;--warn:#f59e0b;--danger:#ef4444}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,sans-serif}
    .wrap{max-width:1400px;margin:0 auto;padding:16px}.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}@media(max-width:1000px){.kpis{grid-template-columns:1fr 1fr}}
    .kpi,.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px}.layout{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:1000px){.layout{grid-template-columns:1fr}}
    table{width:100%;border-collapse:collapse}th,td{padding:7px;border-bottom:1px solid var(--line);font-size:12px;text-align:left}th{color:var(--muted)}
    .health{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.badge{border:1px solid var(--line);border-radius:999px;padding:1px 7px;font-size:11px}
    .ok{color:#a7f3d0}.warn{color:#fde68a}.bad{color:#fecaca} button{background:#0b1221;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px 10px;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2 style="margin:0 0 10px">Dashboard Analytics</h2>
      <button id="refreshBtn">Refresh</button>
    </div>
    <div class="kpis">
      <div class="kpi"><div>Total Records</div><strong id="kTotal">0</strong></div>
      <div class="kpi"><div>Active</div><strong id="kActive">0</strong></div>
      <div class="kpi"><div>Review</div><strong id="kReview">0</strong></div>
      <div class="kpi"><div>Disposed</div><strong id="kDisposed">0</strong></div>
      <div class="kpi"><div>Preserved</div><strong id="kPreserved">0</strong></div>
    </div>
    <div class="layout">
      <section class="card">
        <h3 style="margin:0 0 8px">Capture by Month (12m)</h3>
        <canvas id="barCanvas" width="620" height="260"></canvas>
      </section>
      <section class="card">
        <h3 style="margin:0 0 8px">DocType Donut</h3>
        <svg id="donut" viewBox="0 0 260 260" width="260" height="260"></svg>
        <div id="legend"></div>
      </section>
    </div>
    <div class="layout" style="margin-top:10px">
      <section class="card">
        <h3 style="margin:0 0 8px">Disposal Timeline</h3>
        <table><thead><tr><th>Record</th><th>Due</th><th>Days</th></tr></thead><tbody id="tbTimeline"></tbody></table>
      </section>
      <section class="card">
        <h3 style="margin:0 0 8px">Activity by User</h3>
        <table><thead><tr><th>Actor</th><th>Events</th></tr></thead><tbody id="tbActivity"></tbody></table>
      </section>
    </div>
    <section class="card" style="margin-top:10px">
      <h3 style="margin:0 0 8px">Health Metrics</h3>
      <div class="health" id="healthGrid"></div>
    </section>
  </div>
  <script>
  (function(){
    const API='/api/records/dashboard/stats';
    const h=()=>{const t=localStorage.getItem('token');return t?{Authorization:'Bearer '+t}:{ }};
    function statusClass(v){return v?'ok':'bad';}
    function drawBar(data){
      const c=barCanvas,ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); ctx.fillStyle='#94a3b8'; ctx.font='11px sans-serif';
      const max=Math.max(1,...data.map(x=>x.count||0)); const pad=30; const w=(c.width-pad*2)/Math.max(1,data.length); const h=c.height-pad*2;
      data.forEach((d,i)=>{const bh=((d.count||0)/max)*h; const x=pad+i*w+4; const y=c.height-pad-bh; ctx.fillStyle='#10b981'; ctx.fillRect(x,y,w-8,bh); ctx.fillStyle='#94a3b8'; ctx.fillText((d.month||'').slice(5),x,c.height-10);});
    }
    function polar(cx,cy,r,a){return {x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};}
    function ringPath(cx,cy,r1,r2,a0,a1){
      const p1=polar(cx,cy,r2,a0),p2=polar(cx,cy,r2,a1),p3=polar(cx,cy,r1,a1),p4=polar(cx,cy,r1,a0); const large=(a1-a0)>Math.PI?1:0;
      return `M ${p1.x} ${p1.y} A ${r2} ${r2} 0 ${large} 1 ${p2.x} ${p2.y} L ${p3.x} ${p3.y} A ${r1} ${r1} 0 ${large} 0 ${p4.x} ${p4.y} Z`;
    }
    function drawDonut(byDocType){
      const colors=['#10b981','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#22d3ee','#f97316','#84cc16']; const keys=Object.keys(byDocType||{}); const vals=keys.map(k=>byDocType[k]||0); const total=vals.reduce((a,b)=>a+b,0)||1;
      let a=-Math.PI/2; donut.innerHTML=''; legend.innerHTML='';
      keys.forEach((k,i)=>{const frac=(vals[i]/total); const a1=a+frac*Math.PI*2; const path=document.createElementNS('http://www.w3.org/2000/svg','path'); path.setAttribute('d',ringPath(130,130,60,110,a,a1)); path.setAttribute('fill',colors[i%colors.length]); donut.appendChild(path); a=a1; legend.innerHTML+=`<div><span class="badge" style="border-color:${colors[i%colors.length]}">${k}</span> ${vals[i]}</div>`;});
      if(!keys.length){legend.textContent='Không có dữ liệu';}
    }
    async function load(){
      const r=await fetch(API,{headers:h()}); const j=await r.json(); if(!r.ok) throw new Error(j.error||'Lỗi dashboard');
      kTotal.textContent=j.totalRecords||0; kActive.textContent=j.byState.active||0; kReview.textContent=j.byState.review||0; kDisposed.textContent=j.byState.disposed||0; kPreserved.textContent=j.byState.preserved||0;
      drawBar(j.captureByMonth||[]); drawDonut(j.byDocType||{});
      tbTimeline.innerHTML=(j.disposalTimeline||[]).map(x=>{const cls=(x.days_to_due<0)?'bad':(x.days_to_due<30?'warn':'ok');return `<tr><td>${x.record_number||x.id}</td><td>${x.retention_due_date||''}</td><td class="${cls}">${x.days_to_due}</td></tr>`;}).join('');
      tbActivity.innerHTML=(j.activityByUser||[]).map(x=>`<tr><td>${x.actor}</td><td>${x.count}</td></tr>`).join('');
      const hm=j.healthMetrics||{};
      healthGrid.innerHTML=`<div class="${statusClass(hm.hasClassification)}">Has Classification: ${hm.hasClassification}</div>
      <div class="${statusClass(hm.hasDisposalSchedule)}">Has DS: ${hm.hasDisposalSchedule}</div>
      <div class="${statusClass(hm.hasComponent)}">Has Component: ${hm.hasComponent}</div>
      <div class="${statusClass(hm.hasAgents)}">Has Users: ${hm.hasAgents}</div>
      <div class="${statusClass(hm.hashIntegrity)}">Hash Integrity: ${hm.hashIntegrity}</div>`;
    }
    refreshBtn.onclick=()=>load().catch(e=>alert(e.message||String(e)));
    load().catch(e=>alert(e.message||String(e)));
    setInterval(()=>load().catch(()=>{}),5*60*1000);
  })();
  </script>
</body>
</html>
