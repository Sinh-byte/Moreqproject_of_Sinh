<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danh sách Records - MoReq2010</title>
  <style>
    :root {
      --navy: #0f172a;
      --panel: #17223a;
      --emerald: #10b981;
      --muted: #93a4bf;
      --border: #2d3a53;
      --danger: #ef4444;
      --warn: #f59e0b;
      --ok: #10b981;
      --review: #3b82f6;
      --draft: #fb923c;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--navy); color: #e5edf9; font-family: system-ui, sans-serif; }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 16px; }
    .layout { display: grid; grid-template-columns: 300px 1fr; gap: 16px; }
    @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
    .toolbar { display: grid; grid-template-columns: 1.2fr repeat(4, 1fr); gap: 10px; margin-bottom: 12px; }
    @media (max-width: 980px) { .toolbar { grid-template-columns: 1fr; } }
    .advanced-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; margin-bottom: 10px; }
    @media (max-width: 980px) { .advanced-grid { grid-template-columns: 1fr; } }
    .btn { border:1px solid var(--border); background:#111b2f; color:#e5edf9; border-radius:8px; padding:8px 10px; cursor:pointer; }
    input, select {
      width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: #0e1628; color: #e5edf9;
    }
    .tree ul { list-style: none; padding-left: 16px; margin: 2px 0; }
    .tree-item { padding: 5px 7px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .tree-item:hover { background: rgba(16, 185, 129, 0.12); }
    .tree-item.on { background: rgba(16, 185, 129, 0.2); outline: 1px solid var(--emerald); }
    .table-wrap { overflow: auto; border: 1px solid var(--border); border-radius: 10px; }
    table { width: 100%; border-collapse: collapse; min-width: 980px; }
    th, td { padding: 9px 10px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: top; }
    th { text-align: left; color: var(--muted); background: #111b2f; position: sticky; top: 0; z-index: 1; }
    tr.overdue { background: rgba(239, 68, 68, 0.14); }
    tr.due-soon { background: rgba(245, 158, 11, 0.14); }
    .state { border-radius: 999px; padding: 2px 8px; font-size: 12px; font-weight: 600; display: inline-block; }
    .state-active { background: rgba(16, 185, 129, 0.22); color: #a7f3d0; }
    .state-draft { background: rgba(251, 146, 60, 0.22); color: #fed7aa; }
    .state-review { background: rgba(59, 130, 246, 0.22); color: #bfdbfe; }
    .state-disposed { background: rgba(239, 68, 68, 0.22); color: #fecaca; }
    .state-preserved { background: rgba(16, 185, 129, 0.22); color: #a7f3d0; }
    .tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag { border: 1px solid var(--border); border-radius: 999px; padding: 1px 7px; font-size: 11px; color: #cfe2ff; }
    .row-link { color: #9be8cc; text-decoration: none; font-weight: 600; }
    .row-link:hover { text-decoration: underline; }
    .actions a { color: #9be8cc; text-decoration: none; }
    .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; gap: 12px; }
    .pagination button { border: 1px solid var(--border); background: #111b2f; color: #e5edf9; border-radius: 8px; padding: 7px 10px; cursor: pointer; }
    .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
    .err { display: none; margin-bottom: 10px; border: 1px solid #7f1d1d; background: rgba(127, 29, 29, 0.3); color: #fecaca; padding: 9px 10px; border-radius: 8px; }
    .bulk-box { margin-bottom: 10px; border: 1px solid var(--border); border-radius: 10px; background: #111b2f; padding: 10px; }
    .bulk-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:8px; align-items:end; }
    @media (max-width: 980px) { .bulk-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h2 style="margin:0 0 10px;">Danh sách Record</h2>
    <div id="err" class="err"></div>
    <div class="layout">
      <aside class="panel">
        <h3 style="margin:0 0 8px; font-size:15px;">Phân loại</h3>
        <div id="classTree" class="tree"></div>
      </aside>

      <main class="panel">
        <div class="toolbar">
          <input id="search" placeholder="Từ khóa chung..." />
          <input id="titleSearch" placeholder="Tiêu đề (title)" />
          <input id="docRefSearch" placeholder="Số hiệu (docRef/record no.)" />
          <select id="docType">
            <option value="">Tất cả loại</option>
            <option value="regulation">Regulation</option>
            <option value="decision">Decision</option>
            <option value="contract">Contract</option>
            <option value="minutes">Minutes</option>
            <option value="memo">Memo</option>
            <option value="plan">Plan</option>
            <option value="dispatch">Dispatch</option>
            <option value="other">Other</option>
          </select>
          <select id="state">
            <option value="">Tất cả trạng thái</option>
            <option value="active">active</option>
            <option value="draft">draft</option>
            <option value="review">review</option>
            <option value="disposed">disposed</option>
            <option value="preserved">preserved</option>
          </select>
          <select id="year">
            <option value="">Tất cả năm</option>
          </select>
          <button id="toggleAdvancedBtn" class="btn" type="button">Bộ lọc nâng cao</button>
        </div>
        <div id="advancedFilters" class="advanced-grid" style="display:none">
          <input id="issueDateFrom" type="date" placeholder="Ngày ban hành từ" />
          <input id="issueDateTo" type="date" placeholder="Ngày ban hành đến" />
          <input id="tagIds" placeholder="Tag IDs (phân tách bằng dấu phẩy)" />
          <select id="classificationScope">
            <option value="exact">Classification chính xác</option>
            <option value="descendants">Bao gồm lớp con</option>
          </select>
        </div>
        <div class="bulk-box">
          <div style="font-size:12px; color:var(--muted); margin-bottom:6px;">
            Bulk Actions · Đã chọn: <strong id="selectedCount">0</strong> records
          </div>
          <div class="bulk-grid">
            <div>
              <label style="display:block; font-size:12px; color:var(--muted); margin-bottom:4px;">Đổi Classification</label>
              <select id="bulkClassification"></select>
            </div>
            <button id="bulkClassifyBtn" class="btn" type="button">Áp dụng Classification</button>
            <div>
              <label style="display:block; font-size:12px; color:var(--muted); margin-bottom:4px;">Thêm Tags (CSV IDs)</label>
              <input id="bulkTagIds" placeholder="tag1,tag2" />
            </div>
            <button id="bulkTagsBtn" class="btn" type="button">Gán thêm Tags</button>
          </div>
          <div style="margin-top:8px;">
            <button id="bulkDisposalBtn" class="btn" type="button">Đưa vào quy trình xét duyệt tiêu hủy</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th><input type="checkbox" id="selectAll" /></th>
                <th>Tên + Số hiệu</th>
                <th>Loại</th>
                <th>Ngày ban hành</th>
                <th>Hạn disposal</th>
                <th>Trạng thái</th>
                <th>Tag</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <div class="pagination">
          <div id="pageInfo">Trang 1/1</div>
          <div style="display:flex; gap:8px;">
            <button id="prevBtn">Trước</button>
            <button id="nextBtn">Sau</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/js/ui-utils.js"></script>
  <script>
    (function () {
      const API = '/api/records';
      const state = {
        page: 1,
        limit: 20,
        search: '',
        stateFilter: '',
        docType: '',
        classificationId: '',
        year: '',
        title: '',
        docRef: '',
        issueDateFrom: '',
        issueDateTo: '',
        tagIds: '',
        classificationScope: 'exact',
        totalPages: 1,
        classes: [],
        tags: [],
        selectedIds: new Set(),
      };

      function authHeaders() {
        const token = localStorage.getItem('token');
        return token ? { Authorization: 'Bearer ' + token } : {};
      }

      function showError(msg) {
        const el = document.getElementById('err');
        el.style.display = 'block';
        el.textContent = msg || 'Đã xảy ra lỗi';
      }
      function clearError() {
        const el = document.getElementById('err');
        el.style.display = 'none';
        el.textContent = '';
      }

      function esc(s) {
        return String(s || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function stateClass(value) {
        if (value === 'active') return 'state-active';
        if (value === 'draft') return 'state-draft';
        if (value === 'review') return 'state-review';
        if (value === 'disposed') return 'state-disposed';
        return 'state-preserved';
      }

      function buildQuery() {
        const q = new URLSearchParams();
        q.set('page', String(state.page));
        q.set('limit', String(state.limit));
        q.set('sortBy', 'capture_date');
        q.set('sortDir', 'desc');
        if (state.search) q.set('search', state.search);
        if (state.title) q.set('title', state.title);
        if (state.docRef) q.set('docRef', state.docRef);
        if (state.stateFilter) q.set('state', state.stateFilter);
        if (state.docType) q.set('docType', state.docType);
        if (state.classificationId) {
          q.set('classificationId', state.classificationId);
          q.set('classificationScope', state.classificationScope || 'exact');
        }
        if (state.year) q.set('year', state.year);
        if (state.issueDateFrom) q.set('issueDateFrom', state.issueDateFrom);
        if (state.issueDateTo) q.set('issueDateTo', state.issueDateTo);
        if (state.tagIds) q.set('tagIds', state.tagIds);
        return q.toString();
      }

      function selectedArray() {
        return Array.from(state.selectedIds);
      }

      function updateSelectedCount() {
        document.getElementById('selectedCount').textContent = String(state.selectedIds.size);
      }

      async function loadRecords() {
        clearError();
        try {
          const res = await fetch(API + '?' + buildQuery(), { headers: authHeaders() });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Không tải được records');
          state.totalPages = data.totalPages || 1;
          renderTable(data.records || []);
          updateSelectedCount();
          document.getElementById('pageInfo').textContent = 'Trang ' + state.page + '/' + state.totalPages + ' - ' + (data.total || 0) + ' bản ghi';
          document.getElementById('prevBtn').disabled = state.page <= 1;
          document.getElementById('nextBtn').disabled = state.page >= state.totalPages;
        } catch (e) {
          showError(e.message || String(e));
        }
      }

      function renderTable(records) {
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = '';
        if (!records.length) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#9fb2cd;">Không có dữ liệu</td></tr>';
          return;
        }
        records.forEach(function (r) {
          const tr = document.createElement('tr');
          if (typeof r.days_to_disposal === 'number') {
            if (r.days_to_disposal < 0) tr.classList.add('overdue');
            else if (r.days_to_disposal < 30) tr.classList.add('due-soon');
          }
          const tags = Array.isArray(r.tags) ? r.tags : [];
          const checked = state.selectedIds.has(r.id) ? ' checked' : '';
          tr.innerHTML =
            '<td><input type="checkbox" class="rowCheck" data-id="' + esc(r.id) + '"' + checked + '></td>' +
            '<td><a class="row-link" href="/records/detail.html?id=' + encodeURIComponent(r.id) + '">' + esc(r.title) + '</a><br><small>' + esc(r.record_number || '') + ' · ' + esc(r.doc_ref || '') + '</small></td>' +
            '<td>' + esc(r.doc_type || '') + '</td>' +
            '<td>' + esc(r.issue_date || '—') + '</td>' +
            '<td>' + esc(r.retention_due_date || '—') + (typeof r.days_to_disposal === 'number' ? '<br><small>' + r.days_to_disposal + ' ngày</small>' : '') + '</td>' +
            '<td><span class="state ' + stateClass(r.state) + '">' + esc(r.state) + '</span></td>' +
            '<td><div class="tags">' + tags.map(function (t) { return '<span class="tag">' + esc(t.name) + '</span>'; }).join('') + '</div></td>' +
            '<td class="actions"><a href="/records/detail.html?id=' + encodeURIComponent(r.id) + '">Mở</a></td>';
          tbody.appendChild(tr);
        });
        tbody.querySelectorAll('.rowCheck').forEach(function (cb) {
          cb.addEventListener('change', function () {
            const id = cb.getAttribute('data-id');
            if (cb.checked) state.selectedIds.add(id);
            else state.selectedIds.delete(id);
            updateSelectedCount();
          });
        });
      }

      async function loadClassifications() {
        try {
          const res = await fetch('/api/records/capture/classifications', { headers: authHeaders() });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Không tải được phân loại');
          state.classes = Array.isArray(data) ? data : [];
          renderClassTree();
          renderBulkClassificationOptions();
        } catch (e) {
          showError(e.message || String(e));
        }
      }

      async function loadTags() {
        try {
          const res = await fetch('/api/records/capture/tags', { headers: authHeaders() });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Không tải được tags');
          state.tags = Array.isArray(data) ? data : [];
        } catch (e) {
          showError(e.message || String(e));
        }
      }

      function renderBulkClassificationOptions() {
        const sel = document.getElementById('bulkClassification');
        sel.innerHTML = '<option value="">Chọn Classification</option>';
        state.classes.forEach(function (c) {
          const op = document.createElement('option');
          op.value = c.id;
          op.textContent = (c.code || '') + ' - ' + (c.name || '');
          sel.appendChild(op);
        });
      }

      function renderClassTree() {
        const root = document.getElementById('classTree');
        const byParent = {};
        state.classes.forEach(function (c) {
          const pid = c.parent_id || '__root__';
          if (!byParent[pid]) byParent[pid] = [];
          byParent[pid].push(c);
        });
        root.innerHTML = '';

        const clearBtn = document.createElement('button');
        clearBtn.textContent = 'Bỏ lọc phân loại';
        clearBtn.style.cssText = 'margin-bottom:8px; border:1px solid var(--border); background:#111b2f; color:#e5edf9; border-radius:8px; padding:6px 8px; cursor:pointer;';
        clearBtn.onclick = function () {
          state.classificationId = '';
          state.classificationScope = 'exact';
          state.page = 1;
          document.getElementById('classificationScope').value = 'exact';
          renderClassTree();
          loadRecords();
        };
        root.appendChild(clearBtn);

        function renderNode(parentId, holder) {
          const items = byParent[parentId] || [];
          if (!items.length) return;
          const ul = document.createElement('ul');
          items.forEach(function (it) {
            const li = document.createElement('li');
            const row = document.createElement('div');
            row.className = 'tree-item' + (state.classificationId === it.id ? ' on' : '');
            row.textContent = it.code + ' - ' + it.name;
            row.onclick = function () {
              state.classificationId = it.id;
              state.page = 1;
              renderClassTree();
              loadRecords();
            };
            li.appendChild(row);
            renderNode(it.id, li);
            ul.appendChild(li);
          });
          holder.appendChild(ul);
        }

        renderNode('__root__', root);
      }

      function initYearOptions() {
        const yearSel = document.getElementById('year');
        const now = new Date().getFullYear();
        for (let y = now; y >= now - 20; y--) {
          const op = document.createElement('option');
          op.value = String(y);
          op.textContent = String(y);
          yearSel.appendChild(op);
        }
      }

      async function postJson(url, body) {
        const res = await fetch(url, {
          method: 'POST',
          headers: Object.assign({ 'Content-Type': 'application/json' }, authHeaders()),
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Bulk action thất bại');
        return data;
      }

      async function runBulkClassification() {
        const ids = selectedArray();
        const classificationId = document.getElementById('bulkClassification').value;
        if (!ids.length) throw new Error('Chưa chọn record nào');
        if (!classificationId) throw new Error('Chưa chọn classification');
        return postJson('/api/records/bulk/classification', { recordIds: ids, classificationId });
      }

      async function runBulkTags() {
        const ids = selectedArray();
        const raw = document.getElementById('bulkTagIds').value.trim();
        const tagIds = raw ? raw.split(',').map(function (x) { return x.trim(); }).filter(Boolean) : [];
        if (!ids.length) throw new Error('Chưa chọn record nào');
        if (!tagIds.length) throw new Error('Nhập ít nhất 1 tag ID');
        return postJson('/api/records/bulk/tags', { recordIds: ids, tagIds });
      }

      async function runBulkDisposal() {
        const ids = selectedArray();
        if (!ids.length) throw new Error('Chưa chọn record nào');
        return postJson('/api/records/bulk/disposal-review', { recordIds: ids });
      }

      let searchTimer = null;
      function debounceReload() {
        state.page = 1;
        clearTimeout(searchTimer);
        searchTimer = setTimeout(loadRecords, 300);
      }
      document.getElementById('search').addEventListener('input', function (e) {
        state.search = e.target.value.trim();
        debounceReload();
      });
      document.getElementById('titleSearch').addEventListener('input', function (e) {
        state.title = e.target.value.trim();
        debounceReload();
      });
      document.getElementById('docRefSearch').addEventListener('input', function (e) {
        state.docRef = e.target.value.trim();
        debounceReload();
      });
      document.getElementById('docType').addEventListener('change', function (e) {
        state.docType = e.target.value;
        state.page = 1;
        loadRecords();
      });
      document.getElementById('state').addEventListener('change', function (e) {
        state.stateFilter = e.target.value;
        state.page = 1;
        loadRecords();
      });
      document.getElementById('year').addEventListener('change', function (e) {
        state.year = e.target.value;
        state.page = 1;
        loadRecords();
      });
      document.getElementById('issueDateFrom').addEventListener('change', function (e) {
        state.issueDateFrom = e.target.value;
        state.page = 1;
        loadRecords();
      });
      document.getElementById('issueDateTo').addEventListener('change', function (e) {
        state.issueDateTo = e.target.value;
        state.page = 1;
        loadRecords();
      });
      document.getElementById('tagIds').addEventListener('input', function (e) {
        state.tagIds = e.target.value.trim();
        debounceReload();
      });
      document.getElementById('classificationScope').addEventListener('change', function (e) {
        state.classificationScope = e.target.value || 'exact';
        state.page = 1;
        loadRecords();
      });
      document.getElementById('toggleAdvancedBtn').addEventListener('click', function () {
        const box = document.getElementById('advancedFilters');
        const isHidden = box.style.display === 'none';
        box.style.display = isHidden ? 'grid' : 'none';
      });
      document.getElementById('prevBtn').addEventListener('click', function () {
        if (state.page > 1) {
          state.page -= 1;
          loadRecords();
        }
      });
      document.getElementById('nextBtn').addEventListener('click', function () {
        if (state.page < state.totalPages) {
          state.page += 1;
          loadRecords();
        }
      });
      document.getElementById('selectAll').addEventListener('change', function (e) {
        const checks = document.querySelectorAll('#tbody .rowCheck');
        checks.forEach(function (cb) {
          cb.checked = !!e.target.checked;
          const id = cb.getAttribute('data-id');
          if (cb.checked) state.selectedIds.add(id);
          else state.selectedIds.delete(id);
        });
        updateSelectedCount();
      });
      document.getElementById('bulkClassifyBtn').addEventListener('click', async function () {
        try {
          const r = await runBulkClassification();
          UIToast.success('Đã cập nhật ' + (r.updated || []).length + ' records. Bỏ qua: ' + (r.skipped || []).length);
          await loadRecords();
        } catch (e) { showError(e.message || String(e)); }
      });
      document.getElementById('bulkTagsBtn').addEventListener('click', async function () {
        try {
          const r = await runBulkTags();
          UIToast.success('Đã gán tags cho ' + (r.updated || []).length + ' records. Bỏ qua: ' + (r.skipped || []).length);
          await loadRecords();
        } catch (e) { showError(e.message || String(e)); }
      });
      document.getElementById('bulkDisposalBtn').addEventListener('click', async function () {
        try {
          const r = await runBulkDisposal();
          UIToast.success('Đã đưa vào quy trình: ' + (r.queued || []).length + ' records. Bỏ qua: ' + (r.skipped || []).length);
          await loadRecords();
        } catch (e) { showError(e.message || String(e)); }
      });

      initYearOptions();
      loadClassifications();
      loadTags();
      loadRecords();
    })();
  </script>
</body>
</html>
