<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Record Detail - MoReq2010</title>
  <style>
    :root {
      --navy: #0f172a; --panel: #17223a; --border: #2d3a53; --emerald: #10b981; --muted: #93a4bf;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--navy); color: #e5edf9; font-family: system-ui, sans-serif; }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 16px; }
    .breadcrumb { color: #9fb2cd; font-size: 13px; margin-bottom: 10px; }
    .layout { display: grid; grid-template-columns: 1fr 340px; gap: 16px; }
    @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 10px; }
    .tab-btn {
      border: 1px solid var(--border); background: #111b2f; color: #e5edf9; border-radius: 8px; padding: 7px 10px; cursor: pointer;
    }
    .tab-btn.on { border-color: var(--emerald); color: #a7f3d0; }
    .tab { display: none; } .tab.on { display: block; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 780px) { .grid { grid-template-columns: 1fr; } }
    label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    input, textarea {
      width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: #0e1628; color: #e5edf9;
    }
    textarea { min-height: 100px; resize: vertical; }
    .row { margin-bottom: 10px; }
    button {
      border: 1px solid var(--border); background: #111b2f; color: #e5edf9; border-radius: 8px; padding: 8px 12px; cursor: pointer;
    }
    button.primary { border-color: var(--emerald); background: rgba(16,185,129,0.2); color: #a7f3d0; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .chip { border: 1px solid var(--border); border-radius: 999px; padding: 3px 8px; font-size: 12px; display: inline-block; margin: 2px 4px 2px 0; }
    .timeline { border-left: 2px solid var(--border); padding-left: 10px; margin-top: 8px; }
    .ev { margin-bottom: 10px; font-size: 12px; }
    .muted { color: var(--muted); }
    .progress { height: 10px; border-radius: 999px; background: #0e1628; border: 1px solid var(--border); overflow: hidden; }
    .progress > span { display: block; height: 100%; background: linear-gradient(90deg, #10b981, #34d399); width: 0; }
    .err { display: none; margin-bottom: 10px; border: 1px solid #7f1d1d; background: rgba(127,29,29,.3); color: #fecaca; padding: 9px 10px; border-radius: 8px; }
    a { color: #9be8cc; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="err" class="err"></div>
    <div id="breadcrumb" class="breadcrumb">Tài liệu › ...</div>
    <h2 id="title" style="margin:0 0 12px;">Record Detail</h2>

    <div class="layout">
      <main class="panel">
        <div class="tabs">
          <button class="tab-btn on" data-tab="info">Thông tin Record</button>
          <button class="tab-btn" data-tab="components">Components</button>
          <button class="tab-btn" data-tab="aggregation">Aggregation</button>
        </div>

        <section class="tab on" id="tab-info">
          <div class="grid">
            <div class="row"><label>Record number</label><input id="recordNumber" disabled /></div>
            <div class="row"><label>Số hiệu văn bản</label><input id="docRef" disabled /></div>
            <div class="row"><label>Tiêu đề</label><input id="recordTitle" disabled /></div>
            <div class="row"><label>Loại văn bản</label><input id="docType" disabled /></div>
            <div class="row"><label>Ngày ban hành</label><input id="issueDate" disabled /></div>
            <div class="row"><label>Người soạn</label><input id="author" disabled /></div>
            <div class="row"><label>Người phê duyệt (sửa được)</label><input id="approver" /></div>
            <div class="row"><label>Đơn vị ban hành</label><input id="issuingUnit" disabled /></div>
          </div>
          <div class="row"><label>Mô tả (sửa được)</label><textarea id="description"></textarea></div>
          <div class="row"><label>Từ khóa (sửa được)</label><input id="keywords" /></div>
          <div class="row"><label>Ghi chú (notes - sửa được)</label><textarea id="notes"></textarea></div>
          <div class="row">
            <label>Tags (sửa được)</label>
            <div id="tagsBox"></div>
          </div>
          <button id="saveBtn" class="primary">Lưu</button>
        </section>

        <section class="tab" id="tab-components">
          <div id="componentsList"></div>
          <div class="muted" style="margin-top:10px;">Thêm component đang để placeholder API. Xóa chỉ cho record chưa frozen.</div>
        </section>

        <section class="tab" id="tab-aggregation">
          <div id="aggInfo" class="muted">Không có aggregation.</div>
        </section>
      </main>

      <aside class="panel">
        <h3 style="margin:0 0 8px;">Disposal Schedule</h3>
        <div id="dsInfo" class="muted">—</div>
        <div style="margin:8px 0 4px;" class="muted">Retention progress</div>
        <div class="progress"><span id="retentionBar"></span></div>
        <div id="retentionLabel" class="muted" style="font-size:12px; margin-top:4px;">—</div>

        <h3 style="margin:16px 0 8px;">ACL</h3>
        <div id="aclInfo" class="muted">—</div>

        <h3 style="margin:16px 0 8px;">Event History</h3>
        <div id="eventTimeline" class="timeline"></div>
        <a href="#" id="viewAllEvents">Xem tất cả</a>
      </aside>
    </div>
  </div>

  <script>
    (function () {
      const id = new URLSearchParams(location.search).get('id');
      const API = '/api/records/' + encodeURIComponent(id || '');
      const state = { record: null, tags: [], allTags: [] };

      function authHeaders(isJson) {
        const token = localStorage.getItem('token');
        const h = token ? { Authorization: 'Bearer ' + token } : {};
        if (isJson) h['Content-Type'] = 'application/json';
        return h;
      }
      function showError(msg) {
        const el = document.getElementById('err');
        el.style.display = 'block';
        el.textContent = msg || 'Đã xảy ra lỗi';
      }
      function clearError() {
        const el = document.getElementById('err');
        el.style.display = 'none';
        el.textContent = '';
      }
      function esc(s) {
        return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      async function loadTags() {
        const res = await fetch('/api/records/capture/tags', { headers: authHeaders(false) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Không tải được tags');
        state.allTags = Array.isArray(data) ? data : [];
      }

      async function loadRecord() {
        clearError();
        try {
          if (!id) throw new Error('Thiếu id');
          await loadTags();
          const res = await fetch(API, { headers: authHeaders(false) });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Không tải được record');
          state.record = data;
          state.tags = (data.tags || []).map(function (t) { return t.id; });
          render();
        } catch (e) {
          showError(e.message || String(e));
        }
      }

      function render() {
        const r = state.record;
        document.getElementById('title').textContent = r.title || 'Record';
        document.getElementById('recordNumber').value = r.record_number || '';
        document.getElementById('docRef').value = r.doc_ref || '';
        document.getElementById('recordTitle').value = r.title || '';
        document.getElementById('docType').value = r.doc_type || '';
        document.getElementById('issueDate').value = r.issue_date || '';
        document.getElementById('author').value = r.author || '';
        document.getElementById('issuingUnit').value = r.issuing_unit || '';
        document.getElementById('approver').value = r.approver || '';
        document.getElementById('description').value = r.description || '';
        document.getElementById('keywords').value = r.keywords || '';
        document.getElementById('notes').value = r.disposal_notes || '';

        const path = (r.classification_path || []).map(function (x) { return x.name; }).join(' › ');
        document.getElementById('breadcrumb').textContent = 'Tài liệu › ' + path + ' › ' + (r.title || '');

        renderTags();
        renderComponents();
        renderAcl();
        renderEvents();
        renderAggregation();
        renderDisposalBox();

        const frozen = r.is_frozen === 1;
        document.getElementById('saveBtn').disabled = false;
        if (frozen) {
          // allowed fields vẫn có thể sửa, chỉ khóa core fields đã disabled sẵn
        }
      }

      function renderTags() {
        const box = document.getElementById('tagsBox');
        box.innerHTML = '';
        state.allTags.forEach(function (t) {
          const label = document.createElement('label');
          label.className = 'chip';
          const c = document.createElement('input');
          c.type = 'checkbox';
          c.checked = state.tags.indexOf(t.id) >= 0;
          c.onchange = function () {
            if (c.checked) {
              if (state.tags.indexOf(t.id) < 0) state.tags.push(t.id);
            } else {
              state.tags = state.tags.filter(function (x) { return x !== t.id; });
            }
          };
          label.appendChild(c);
          label.appendChild(document.createTextNode(' ' + t.name));
          box.appendChild(label);
        });
      }

      function renderComponents() {
        const box = document.getElementById('componentsList');
        const components = state.record.components || [];
        if (!components.length) {
          box.innerHTML = '<div class="muted">Không có component.</div>';
          return;
        }
        const frozen = state.record.is_frozen === 1;
        box.innerHTML = components.map(function (c) {
          return (
            '<div style="border-bottom:1px solid var(--border); padding:8px 0;">' +
            '<strong>' + esc(c.filename) + '</strong>' +
            (c.is_primary === 1 ? ' <span class="chip">Chính</span>' : '') +
            '<div class="muted" style="font-size:12px;">' + esc(c.mime_type) + ' · ' + esc(c.file_size) + ' bytes</div>' +
            '<div style="margin-top:6px;">' +
            '<a href="/uploads/records/' + encodeURIComponent(c.stored_filename).replace(/%2F/g, '/') + '" target="_blank">Download</a>' +
            (frozen ? '' : ' · <a href="#" data-del="' + esc(c.id) + '">Xóa</a>') +
            '</div></div>'
          );
        }).join('');
      }

      function renderAcl() {
        const acl = state.record.acl || [];
        document.getElementById('aclInfo').innerHTML = acl.length
          ? acl.map(function (a) {
              return '<div style="margin-bottom:6px;"><strong>' + esc(a.user_name || a.user_id) + '</strong> - ' + esc(a.permission) + '</div>';
            }).join('')
          : '<span class="muted">Chưa có ACL riêng.</span>';
      }

      function renderEvents() {
        const events = state.record.event_history || [];
        document.getElementById('eventTimeline').innerHTML = events.length
          ? events.map(function (e) {
              return '<div class="ev"><div><strong>' + esc(e.event_type) + '</strong> <span class="muted">(' + esc(e.occurred_at) + ')</span></div><div class="muted">' + esc(e.actor_label || e.actor_id || 'SYSTEM') + '</div></div>';
            }).join('')
          : '<div class="muted">Không có lịch sử.</div>';
      }

      function renderAggregation() {
        const agg = state.record.aggregation_id;
        document.getElementById('aggInfo').innerHTML = agg
          ? 'Aggregation ID: <strong>' + esc(agg) + '</strong>'
          : 'Record chưa gắn aggregation.';
      }

      function parseDate(v) {
        if (!v) return null;
        const d = new Date(v);
        return Number.isNaN(d.getTime()) ? null : d;
      }

      function renderDisposalBox() {
        const due = parseDate(state.record.retention_due_date);
        const trigger = parseDate(state.record.trigger_date || state.record.issue_date);
        const now = new Date();
        const ds = state.record.disposal_schedule_id || '—';
        document.getElementById('dsInfo').innerHTML =
          'Schedule ID: <strong>' + esc(ds) + '</strong><br>Due date: <strong>' + esc(state.record.retention_due_date || '—') + '</strong>';
        if (!due || !trigger || due <= trigger) {
          document.getElementById('retentionBar').style.width = '0%';
          document.getElementById('retentionLabel').textContent = 'Không đủ dữ liệu retention.';
          return;
        }
        const total = due.getTime() - trigger.getTime();
        const done = Math.min(total, Math.max(0, now.getTime() - trigger.getTime()));
        const pct = Math.round((done / total) * 100);
        const days = Math.floor((due.getTime() - now.getTime()) / (1000 * 60 * 60 * 24));
        document.getElementById('retentionBar').style.width = pct + '%';
        document.getElementById('retentionLabel').textContent = pct + '% · còn ' + days + ' ngày';
      }

      async function savePatch() {
        clearError();
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        try {
          const body = {
            description: document.getElementById('description').value.trim() || null,
            keywords: document.getElementById('keywords').value.trim() || null,
            approver: document.getElementById('approver').value.trim() || null,
            notes: document.getElementById('notes').value.trim() || null,
            tagIds: state.tags.slice(),
          };
          const res = await fetch(API, {
            method: 'PATCH',
            headers: authHeaders(true),
            body: JSON.stringify(body),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Lưu thất bại');
          state.record = Object.assign({}, state.record, data);
          alert('Đã cập nhật metadata');
          render();
        } catch (e) {
          showError(e.message || String(e));
        } finally {
          btn.disabled = false;
        }
      }

      document.querySelectorAll('.tab-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          const tab = btn.getAttribute('data-tab');
          document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('on'); });
          document.querySelectorAll('.tab').forEach(function (p) { p.classList.remove('on'); });
          btn.classList.add('on');
          document.getElementById('tab-' + tab).classList.add('on');
        });
      });

      document.getElementById('saveBtn').addEventListener('click', savePatch);
      document.getElementById('viewAllEvents').addEventListener('click', function (e) {
        e.preventDefault();
        alert('Chức năng xem tất cả event sẽ mở trong trang riêng.');
      });

      loadRecord();
    })();
  </script>
</body>
</html>
