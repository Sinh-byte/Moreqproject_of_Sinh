<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Record Detail - MoReq2010</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #17223a;
      --line: #2d3a53;
      --txt: #e5edf9;
      --muted: #9fb2cd;
      --ok: #10b981;
      --warn: #f59e0b;
      --danger: #ef4444;
      --review: #3b82f6;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--txt); font-family: system-ui, sans-serif; }
    .wrap { max-width: 1320px; margin: 0 auto; padding: 16px; }
    .err { display:none; margin-bottom:10px; border:1px solid #7f1d1d; background:rgba(127,29,29,.3); color:#fecaca; padding:9px 10px; border-radius:8px; }
    .confidential-banner { display:none; margin-bottom:10px; border:1px solid #7c2d12; background: rgba(245, 158, 11, .2); color:#fde68a; padding:10px; border-radius:8px; }
    .top { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; flex-wrap:wrap; margin-bottom:12px; }
    .title-wrap h2 { margin:0 0 4px; }
    .breadcrumb { color: var(--muted); font-size: 13px; }
    .status-badge { padding:6px 10px; border-radius:999px; font-size:12px; font-weight:700; border:1px solid var(--line); text-transform:uppercase; letter-spacing:.03em; }
    .st-active { background: rgba(16,185,129,.18); color:#a7f3d0; border-color: #10b981; }
    .st-disposed { background: rgba(239,68,68,.18); color:#fecaca; border-color: #ef4444; }
    .st-frozen { background: rgba(245,158,11,.18); color:#fde68a; border-color: #f59e0b; }
    .st-review { background: rgba(59,130,246,.18); color:#bfdbfe; border-color: #3b82f6; }
    .st-default { background: rgba(148,163,184,.14); color:#cbd5e1; border-color:#64748b; }
    .actions { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
    button, .btn-link {
      border: 1px solid var(--line); background:#111b2f; color:var(--txt); border-radius:8px; padding:8px 12px; cursor:pointer; text-decoration:none; font-size:13px;
    }
    button.primary { border-color:var(--ok); color:#a7f3d0; background: rgba(16,185,129,.16); }
    button.warn { border-color:var(--warn); color:#fde68a; background: rgba(245,158,11,.15); }
    button.danger { border-color:var(--danger); color:#fecaca; background: rgba(239,68,68,.15); }
    .main-grid { display:grid; grid-template-columns: 1.15fr .85fr; gap:14px; }
    @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }
    .panel { background: var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px; }
    .panel h3 { margin:0 0 10px; font-size:15px; }
    .meta-grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    @media (max-width: 760px) { .meta-grid { grid-template-columns: 1fr; } }
    label { display:block; color:var(--muted); font-size:12px; margin-bottom:4px; }
    input, textarea { width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:8px; background:#0e1628; color:var(--txt); }
    textarea { min-height:95px; resize:vertical; }
    .row { margin-bottom:10px; }
    .chip { border:1px solid var(--line); border-radius:999px; padding:3px 8px; font-size:12px; display:inline-block; margin:2px 4px 2px 0; }
    .preview-box { min-height:480px; border:1px solid var(--line); border-radius:10px; background:#0d1526; overflow:hidden; display:flex; align-items:center; justify-content:center; }
    .preview-box iframe, .preview-box img { width:100%; height:480px; border:0; object-fit:contain; background:#fff; }
    .preview-placeholder { color:var(--muted); font-size:14px; padding:10px; text-align:center; }
    .components { margin-top:10px; max-height:220px; overflow:auto; border-top:1px solid var(--line); padding-top:8px; }
    .comp { padding:8px 0; border-bottom:1px solid var(--line); font-size:13px; }
    .tabs { display:flex; gap:8px; margin:14px 0 10px; flex-wrap:wrap; }
    .tab-btn { border:1px solid var(--line); background:#111b2f; color:var(--txt); border-radius:8px; padding:7px 10px; cursor:pointer; }
    .tab-btn.on { border-color:var(--ok); color:#a7f3d0; }
    .tab { display:none; }
    .tab.on { display:block; }
    .timeline { border-left:2px solid var(--line); padding-left:10px; }
    .ev { margin-bottom:10px; font-size:12px; }
    .muted { color:var(--muted); }
    .ret { height:10px; border-radius:999px; background:#0e1628; border:1px solid var(--line); overflow:hidden; }
    .ret > span { display:block; height:100%; background:linear-gradient(90deg, #10b981, #34d399); width:0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="err" class="err"></div>
    <div id="confidentialBanner" class="confidential-banner"></div>

    <div class="top">
      <div class="title-wrap">
        <div id="breadcrumb" class="breadcrumb">Tài liệu › ...</div>
        <h2 id="title">Record Detail</h2>
      </div>
      <div id="statusBadge" class="status-badge st-default">UNKNOWN</div>
    </div>

    <div class="actions">
      <a id="btnDownload" class="btn-link" href="#" target="_blank" rel="noopener">Tải xuống</a>
      <button id="btnEditMeta" class="primary">Chỉnh sửa metadata</button>
      <button id="btnFreeze" class="warn">Đóng băng (Freeze)</button>
      <button id="btnRequestDisposal" class="danger">Yêu cầu tiêu hủy</button>
      <button id="btnSaveMeta" class="primary" style="display:none;">Lưu metadata</button>
    </div>

    <div class="main-grid">
      <section class="panel">
        <h3>Metadata chi tiết</h3>
        <div class="meta-grid">
          <div class="row"><label>Record number</label><input id="recordNumber" disabled /></div>
          <div class="row"><label>Số hiệu văn bản</label><input id="docRef" disabled /></div>
          <div class="row"><label>Tiêu đề</label><input id="recordTitle" disabled /></div>
          <div class="row"><label>Loại văn bản</label><input id="docType" disabled /></div>
          <div class="row"><label>Ngày ban hành</label><input id="issueDate" disabled /></div>
          <div class="row"><label>Người soạn</label><input id="author" disabled /></div>
          <div class="row"><label>Người phê duyệt</label><input id="approver" data-editable="1" disabled /></div>
          <div class="row"><label>Đơn vị ban hành</label><input id="issuingUnit" disabled /></div>
        </div>
        <div class="row"><label>Mô tả</label><textarea id="description" data-editable="1" disabled></textarea></div>
        <div class="row"><label>Từ khóa</label><input id="keywords" data-editable="1" disabled /></div>
        <div class="row"><label>Ghi chú</label><textarea id="notes" data-editable="1" disabled></textarea></div>
        <div class="row"><label>Tags</label><div id="tagsBox"></div></div>

        <div class="row">
          <label>Disposal Schedule</label>
          <div id="dsInfo" class="muted">—</div>
          <div class="ret" style="margin-top:8px;"><span id="retentionBar"></span></div>
          <div id="retentionLabel" class="muted" style="font-size:12px; margin-top:4px;">—</div>
        </div>
      </section>

      <section class="panel">
        <h3>File Preview</h3>
        <div id="previewBox" class="preview-box">
          <div class="preview-placeholder">Không có file để xem trước.</div>
        </div>
        <div class="components" id="componentsList"></div>
      </section>
    </div>

    <div class="tabs">
      <button class="tab-btn on" data-tab="audit">Audit Trail</button>
      <button class="tab-btn" data-tab="acl">ACL</button>
      <button class="tab-btn" data-tab="aggregation">Aggregation</button>
    </div>

    <section class="panel tab on" id="tab-audit">
      <h3>Event History</h3>
      <div id="eventTimeline" class="timeline"></div>
    </section>
    <section class="panel tab" id="tab-acl">
      <h3>ACL</h3>
      <div id="aclInfo" class="muted">—</div>
    </section>
    <section class="panel tab" id="tab-aggregation">
      <h3>Aggregation</h3>
      <div id="aggInfo" class="muted">—</div>
    </section>
  </div>

  <script src="/js/ui-utils.js"></script>
  <script>
    (function () {
      const id = new URLSearchParams(location.search).get('id');
      const API = '/api/records/' + encodeURIComponent(id || '');
      const state = { record: null, tags: [], allTags: [], editMode: false };

      function authHeaders(isJson) {
        const token = localStorage.getItem('token');
        const h = token ? { Authorization: 'Bearer ' + token } : {};
        if (isJson) h['Content-Type'] = 'application/json';
        return h;
      }
      function showError(msg) {
        const el = document.getElementById('err');
        el.style.display = 'block';
        el.textContent = msg || 'Đã xảy ra lỗi';
      }
      function clearError() {
        const el = document.getElementById('err');
        el.style.display = 'none';
        el.textContent = '';
      }
      function esc(s) {
        return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function statusBadgeClass(record) {
        if (record && record.is_frozen === 1) return 'st-frozen';
        if (record && record.state === 'active') return 'st-active';
        if (record && record.state === 'disposed') return 'st-disposed';
        if (record && record.state === 'review') return 'st-review';
        return 'st-default';
      }

      function setEditMode(on) {
        state.editMode = !!on;
        document.querySelectorAll('[data-editable="1"]').forEach(function (el) {
          el.disabled = !on;
        });
        document.getElementById('btnSaveMeta').style.display = on ? 'inline-block' : 'none';
        document.getElementById('btnEditMeta').textContent = on ? 'Hủy chỉnh sửa' : 'Chỉnh sửa metadata';
      }

      async function loadTags() {
        const res = await fetch('/api/records/capture/tags', { headers: authHeaders(false) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Không tải được tags');
        state.allTags = Array.isArray(data) ? data : [];
      }

      async function loadRecord() {
        clearError();
        try {
          if (!id) throw new Error('Thiếu id');
          await loadTags();
          const res = await fetch(API, { headers: authHeaders(false) });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Không tải được record');
          state.record = data;
          state.tags = (data.tags || []).map(function (t) { return t.id; });
          setEditMode(false);
          render();
        } catch (e) {
          showError(e.message || String(e));
        }
      }

      function renderStatus() {
        const b = document.getElementById('statusBadge');
        const r = state.record || {};
        let text = (r.state || 'unknown').toUpperCase();
        if (r.is_frozen === 1) text += ' / FROZEN';
        b.className = 'status-badge ' + statusBadgeClass(r);
        b.textContent = text;
      }

      function render() {
        const r = state.record;
        renderConfidentialWarning();
        renderStatus();
        document.getElementById('title').textContent = r.title || 'Record';
        document.getElementById('recordNumber').value = r.record_number || '';
        document.getElementById('docRef').value = r.doc_ref || '';
        document.getElementById('recordTitle').value = r.title || '';
        document.getElementById('docType').value = r.doc_type || '';
        document.getElementById('issueDate').value = r.issue_date || '';
        document.getElementById('author').value = r.author || '';
        document.getElementById('issuingUnit').value = r.issuing_unit || '';
        document.getElementById('approver').value = r.approver || '';
        document.getElementById('description').value = r.description || '';
        document.getElementById('keywords').value = r.keywords || '';
        document.getElementById('notes').value = r.disposal_notes || '';

        const path = (r.classification_path || []).map(function (x) { return x.name; }).join(' › ');
        document.getElementById('breadcrumb').textContent = 'Tài liệu › ' + path + ' › ' + (r.title || '');

        renderTags();
        renderComponents();
        renderPreview();
        renderAcl();
        renderEvents();
        renderAggregation();
        renderDisposalBox();
        renderActionsState();
      }

      function renderTags() {
        const box = document.getElementById('tagsBox');
        box.innerHTML = '';
        state.allTags.forEach(function (t) {
          const label = document.createElement('label');
          label.className = 'chip';
          const c = document.createElement('input');
          c.type = 'checkbox';
          c.checked = state.tags.indexOf(t.id) >= 0;
          c.disabled = !state.editMode;
          c.onchange = function () {
            if (c.checked) {
              if (state.tags.indexOf(t.id) < 0) state.tags.push(t.id);
            } else {
              state.tags = state.tags.filter(function (x) { return x !== t.id; });
            }
          };
          label.appendChild(c);
          label.appendChild(document.createTextNode(' ' + t.name));
          box.appendChild(label);
        });
      }

      function renderComponents() {
        const box = document.getElementById('componentsList');
        const components = state.record.components || [];
        if (!components.length) {
          box.innerHTML = '<div class="muted">Không có component.</div>';
          document.getElementById('btnDownload').removeAttribute('href');
          return;
        }
        const firstDownloadable = components.find(function (c) { return c.stored_filename && !c.is_redacted; });
        if (firstDownloadable) {
          document.getElementById('btnDownload').href = '/uploads/records/' + encodeURIComponent(firstDownloadable.stored_filename).replace(/%2F/g, '/');
        } else {
          document.getElementById('btnDownload').removeAttribute('href');
        }
        box.innerHTML = components.map(function (c) {
          return (
            '<div class="comp">' +
            '<strong>' + esc(c.filename) + '</strong>' +
            (c.is_primary === 1 ? ' <span class="chip">Chính</span>' : '') +
            '<div class="muted">' + esc(c.mime_type) + ' · ' + esc(c.file_size) + ' bytes</div>' +
            '<div class="muted">SHA256: ' + esc(c.sha256_hash || '—') + '</div>' +
            '</div>'
          );
        }).join('');
      }

      function renderPreview() {
        const box = document.getElementById('previewBox');
        const components = state.record.components || [];
        const primary = components.find(function (c) { return c.is_primary === 1; }) || components[0];
        if (!primary || !primary.stored_filename || primary.is_redacted) {
          box.innerHTML = '<div class="preview-placeholder">Nội dung file không khả dụng hoặc đã được redacted.</div>';
          return;
        }
        const url = '/uploads/records/' + encodeURIComponent(primary.stored_filename).replace(/%2F/g, '/');
        const mt = String(primary.mime_type || '').toLowerCase();
        if (mt === 'application/pdf') {
          box.innerHTML = '<iframe src="' + url + '#view=FitH"></iframe>';
          return;
        }
        if (mt.startsWith('image/')) {
          box.innerHTML = '<img src="' + url + '" alt="preview" />';
          return;
        }
        box.innerHTML = '<div class="preview-placeholder">Không hỗ trợ preview định dạng này. Vui lòng tải xuống để xem.</div>';
      }

      function renderConfidentialWarning() {
        const banner = document.getElementById('confidentialBanner');
        const c = state.record && state.record.confidentiality ? state.record.confidentiality : null;
        if (!c || !c.is_confidential) {
          banner.style.display = 'none';
          banner.textContent = '';
          return;
        }
        banner.style.display = 'block';
        if (c.redacted) {
          banner.textContent = 'Hồ sơ đang ở chế độ bảo mật. Tài khoản hiện tại chỉ xem được metadata cơ bản; nội dung file đã được che.';
        } else {
          banner.textContent = 'Hồ sơ đang ở chế độ bảo mật. Bạn có quyền view_confidential và được phép xem nội dung file.';
        }
      }

      function renderAcl() {
        const acl = state.record.acl || [];
        document.getElementById('aclInfo').innerHTML = acl.length
          ? acl.map(function (a) {
              return '<div style="margin-bottom:6px;"><strong>' + esc(a.user_name || a.principal_id || a.user_id) + '</strong> - ' + esc(a.permission) + '</div>';
            }).join('')
          : '<span class="muted">Chưa có ACL riêng.</span>';
      }

      function renderEvents() {
        const events = state.record.event_history || [];
        document.getElementById('eventTimeline').innerHTML = events.length
          ? events.map(function (e) {
              return '<div class="ev"><div><strong>' + esc(e.event_type) + '</strong> <span class="muted">(' + esc(e.occurred_at) + ')</span></div><div class="muted">' + esc(e.actor_label || e.actor_id || 'SYSTEM') + '</div></div>';
            }).join('')
          : '<div class="muted">Không có lịch sử.</div>';
      }

      function renderAggregation() {
        const agg = state.record.aggregation_id;
        document.getElementById('aggInfo').innerHTML = agg
          ? 'Aggregation ID: <strong>' + esc(agg) + '</strong>'
          : 'Record chưa gắn aggregation.';
      }

      function parseDate(v) {
        if (!v) return null;
        const d = new Date(v);
        return Number.isNaN(d.getTime()) ? null : d;
      }

      function renderDisposalBox() {
        const due = parseDate(state.record.retention_due_date);
        const trigger = parseDate(state.record.trigger_date || state.record.issue_date);
        const now = new Date();
        const ds = state.record.disposal_schedule_id || '—';
        document.getElementById('dsInfo').innerHTML =
          'Schedule ID: <strong>' + esc(ds) + '</strong><br>Due date: <strong>' + esc(state.record.retention_due_date || '—') + '</strong>';
        if (!due || !trigger || due <= trigger) {
          document.getElementById('retentionBar').style.width = '0%';
          document.getElementById('retentionLabel').textContent = 'Không đủ dữ liệu retention.';
          return;
        }
        const total = due.getTime() - trigger.getTime();
        const done = Math.min(total, Math.max(0, now.getTime() - trigger.getTime()));
        const pct = Math.round((done / total) * 100);
        const days = Math.floor((due.getTime() - now.getTime()) / (1000 * 60 * 60 * 24));
        document.getElementById('retentionBar').style.width = pct + '%';
        document.getElementById('retentionLabel').textContent = pct + '% · còn ' + days + ' ngày';
      }

      function renderActionsState() {
        const frozen = state.record && state.record.is_frozen === 1;
        document.getElementById('btnFreeze').disabled = frozen;
        document.getElementById('btnEditMeta').disabled = false;
        document.getElementById('btnRequestDisposal').disabled = false;
      }

      async function savePatch() {
        clearError();
        const btn = document.getElementById('btnSaveMeta');
        btn.disabled = true;
        try {
          const body = {
            description: document.getElementById('description').value.trim() || null,
            keywords: document.getElementById('keywords').value.trim() || null,
            approver: document.getElementById('approver').value.trim() || null,
            notes: document.getElementById('notes').value.trim() || null,
            tagIds: state.tags.slice(),
          };
          const res = await fetch(API, {
            method: 'PATCH',
            headers: authHeaders(true),
            body: JSON.stringify(body),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Lưu thất bại');
          state.record = Object.assign({}, state.record, data);
          setEditMode(false);
          render();
          UIToast.success('Đã cập nhật metadata');
        } catch (e) {
          showError(e.message || String(e));
        } finally {
          btn.disabled = false;
        }
      }

      async function requestDisposal() {
        try {
          const res = await fetch('/api/records/bulk/disposal-review', {
            method: 'POST',
            headers: authHeaders(true),
            body: JSON.stringify({ recordIds: [id] }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Không thể gửi yêu cầu tiêu hủy');
          const queued = (data.queued || []).length;
          const skipped = (data.skipped || []).length;
          UIToast.success('Đã gửi yêu cầu tiêu hủy. Queued: ' + queued + ', skipped: ' + skipped);
          loadRecord();
        } catch (e) {
          showError(e.message || String(e));
        }
      }

      function freezeRecordFallback() {
        UIToast.warn('Hiện chưa có endpoint Freeze chuyên biệt. Bạn có thể quản lý trạng thái qua quy trình tiêu hủy/duyệt hoặc bổ sung API freeze.');
      }

      document.querySelectorAll('.tab-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          const tab = btn.getAttribute('data-tab');
          document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('on'); });
          document.querySelectorAll('.tab').forEach(function (p) { p.classList.remove('on'); });
          btn.classList.add('on');
          document.getElementById('tab-' + tab).classList.add('on');
        });
      });

      document.getElementById('btnEditMeta').addEventListener('click', function () {
        setEditMode(!state.editMode);
        if (state.editMode) renderTags();
      });
      document.getElementById('btnSaveMeta').addEventListener('click', savePatch);
      document.getElementById('btnRequestDisposal').addEventListener('click', requestDisposal);
      document.getElementById('btnFreeze').addEventListener('click', freezeRecordFallback);
      document.getElementById('btnDownload').addEventListener('click', function (e) {
        if (!this.getAttribute('href')) {
          e.preventDefault();
          showError('Không có file khả dụng để tải xuống.');
        }
      });

      loadRecord();
    })();
  </script>
</body>
</html>
