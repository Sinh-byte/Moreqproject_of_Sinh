<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Disposal Schedules</title>
  <style>
    :root{--bg:#0f172a;--panel:#1e293b;--line:#334155;--txt:#e2e8f0;--muted:#94a3b8;--ok:#10b981;--des:#ef4444;--rev:#f59e0b}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,sans-serif}
    .wrap{max-width:1280px;margin:0 auto;padding:16px}.layout{display:grid;grid-template-columns:420px 1fr;gap:14px}@media(max-width:980px){.layout{grid-template-columns:1fr}}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px}
    .list-item{padding:8px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;cursor:pointer}
    .list-item.on{outline:1px solid var(--ok);background:rgba(16,185,129,.14)}
    .badge{border:1px solid var(--line);border-radius:999px;padding:1px 7px;font-size:11px}
    .b-des{border-color:var(--des);color:#fecaca}.b-pre{border-color:var(--ok);color:#a7f3d0}.b-rev{border-color:var(--rev);color:#fde68a}
    label{display:block;font-size:12px;color:var(--muted);margin:6px 0 4px}
    input,textarea,select{width:100%;background:#0b1221;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px}
    textarea{min-height:70px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    button{background:#0b1221;color:var(--txt);border:1px solid var(--line);padding:8px 10px;border-radius:8px;cursor:pointer}
    button.primary{border-color:var(--ok);color:#a7f3d0}
    .timeline{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:14px}
    .step{border:1px solid var(--line);border-radius:8px;padding:7px;font-size:12px;text-align:center}.muted{color:var(--muted)}
    .err{display:none;background:rgba(127,29,29,.3);border:1px solid #7f1d1d;color:#fecaca;padding:8px;border-radius:8px;margin-bottom:10px}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);align-items:center;justify-content:center;padding:16px}
    .modal-box{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;max-width:700px;width:100%;max-height:80vh;overflow:auto}
  </style>
</head>
<body>
  <div class="wrap">
    <h2 style="margin:0 0 10px">Admin - Disposal Schedules</h2>
    <div id="err" class="err"></div>
    <div class="layout">
      <section class="card">
        <div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">Danh sách DS</h3><button id="btnCreate">Tạo mới</button></div>
        <div id="list" style="margin-top:10px"></div>
      </section>
      <section class="card">
        <h3 style="margin:0 0 8px">Chi tiết DS</h3>
        <div id="empty" class="muted">Chọn một DS để xem và sửa.</div>
        <div id="form" style="display:none">
          <label>Code</label><input id="fCode">
          <label>Name</label><input id="fName">
          <label>Legal basis</label><input id="fLegal">
          <label>Trigger event</label><select id="fTrigger"><option value="issue_date">issue_date</option><option value="expiry_date">expiry_date</option><option value="closure_date">closure_date</option><option value="custom">custom</option></select>
          <label>Retention years</label><input id="fYears" type="number">
          <label><input id="fPerm" type="checkbox"> Is permanent</label>
          <label>Disposal action</label><select id="fAction"><option value="destruction">destruction</option><option value="preservation">preservation</option><option value="review">review</option><option value="transfer">transfer</option></select>
          <label>Review action approve</label><input id="fReviewApprove">
          <label>Review action retain</label><input id="fReviewRetain">
          <label>Confirmation days</label><input id="fConfirmDays" type="number">
          <label>Alert recipients (JSON)</label><textarea id="fRecipients"></textarea>
          <label>Notes</label><textarea id="fNotes"></textarea>
          <label><input id="fActive" type="checkbox"> Is active</label>
          <div class="actions">
            <button class="primary" id="btnSave">Lưu</button>
            <button id="btnDeactivate">Deactivate</button>
            <button id="btnUsing">Xem records đang dùng</button>
          </div>
          <div class="timeline">
            <div class="step">Capture</div><div class="step">Active</div><div class="step">Retention End</div>
            <div class="step">Alert</div><div class="step">Review</div><div class="step">Disposal</div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-box">
      <h3 style="margin:0 0 8px">Records đang dùng DS</h3>
      <div id="modalContent"></div>
      <div style="margin-top:10px"><button id="modalClose">Đóng</button></div>
    </div>
  </div>

  <script>
  (function(){
    const API='/api/admin/records/disposal-schedules';
    const state={list:[],selected:null,lastConflictRecords:[]};
    const h=()=>{const t=localStorage.getItem('token');return t?{Authorization:'Bearer '+t,'Content-Type':'application/json'}:{'Content-Type':'application/json'}};
    const showErr=(m)=>{const e=document.getElementById('err');e.style.display='block';e.textContent=m||'Lỗi'};
    const clearErr=()=>{const e=document.getElementById('err');e.style.display='none';e.textContent='';};
    const esc=(s)=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');

    function actionBadge(action){
      if(action==='destruction') return '<span class="badge b-des">destruction</span>';
      if(action==='preservation') return '<span class="badge b-pre">preservation</span>';
      if(action==='review') return '<span class="badge b-rev">review</span>';
      return '<span class="badge">'+esc(action)+'</span>';
    }
    function retentionBadge(it){
      if(it.is_permanent===1) return '<span class="badge">PERM</span>';
      return '<span class="badge">'+(it.retention_years!=null?it.retention_years+'Y':'N/A')+'</span>';
    }

    async function load(){
      clearErr();
      try{
        const r=await fetch(API,{headers:h()}); const j=await r.json();
        if(!r.ok) throw new Error(j.error||'Lỗi tải DS');
        state.list=j; renderList();
        if(state.selected){ const found=state.list.find(x=>x.id===state.selected.id); if(found) select(found.id); }
      }catch(e){showErr(e.message||String(e))}
    }
    function renderList(){
      const box=document.getElementById('list'); box.innerHTML='';
      state.list.forEach(it=>{
        const d=document.createElement('div'); d.className='list-item'+(state.selected&&state.selected.id===it.id?' on':'');
        d.innerHTML='<strong>'+esc(it.code)+'</strong> - '+esc(it.name)+'<br>'+retentionBadge(it)+' '+actionBadge(it.disposal_action)+' <span class="muted">records: '+(it.record_count||0)+'</span>';
        d.onclick=()=>select(it.id); box.appendChild(d);
      });
    }
    function select(id){
      state.selected=state.list.find(x=>x.id===id)||null; renderList();
      document.getElementById('empty').style.display=state.selected?'none':'block';
      document.getElementById('form').style.display=state.selected?'block':'none';
      if(!state.selected) return;
      const s=state.selected;
      fCode.value=s.code||''; fName.value=s.name||''; fLegal.value=s.legal_basis||''; fTrigger.value=s.trigger_event||'issue_date';
      fYears.value=s.retention_years==null?'':String(s.retention_years); fPerm.checked=s.is_permanent===1; fAction.value=s.disposal_action||'destruction';
      fReviewApprove.value=s.review_action_approve||''; fReviewRetain.value=s.review_action_retain||''; fConfirmDays.value=s.confirmation_days||30;
      fRecipients.value=s.alert_recipients||''; fNotes.value=s.notes||''; fActive.checked=s.is_active===1;
      btnDeactivate.disabled=s.is_active===0;
      state.lastConflictRecords=[];
    }
    function currentBody(){
      return {
        code:fCode.value.trim(),name:fName.value.trim(),legal_basis:fLegal.value.trim()||null,trigger_event:fTrigger.value,
        retention_years:fYears.value===''?null:Number(fYears.value),is_permanent:fPerm.checked?1:0,disposal_action:fAction.value,
        review_action_approve:fReviewApprove.value.trim()||null,review_action_retain:fReviewRetain.value.trim()||null,
        confirmation_days:Number(fConfirmDays.value||30),alert_recipients:fRecipients.value.trim()||null,notes:fNotes.value.trim()||null,is_active:fActive.checked?1:0
      };
    }
    async function save(){
      if(!state.selected) return;
      clearErr();
      try{
        const r=await fetch(API+'/'+encodeURIComponent(state.selected.id),{method:'PATCH',headers:h(),body:JSON.stringify(currentBody())});
        const j=await r.json();
        if(r.status===409){ state.lastConflictRecords=j.affected_records||[]; showErr((j.error||'Conflict')+' — dùng nút "Xem records đang dùng"'); return; }
        if(!r.ok) throw new Error(j.error||'Lỗi cập nhật DS');
        await load(); select(j.id);
      }catch(e){showErr(e.message||String(e))}
    }
    async function deactivate(){
      if(!state.selected) return;
      if(!confirm('Deactivate DS này?')) return;
      clearErr();
      try{
        const r=await fetch(API+'/'+encodeURIComponent(state.selected.id)+'/deactivate',{method:'PATCH',headers:h()});
        const j=await r.json(); if(!r.ok) throw new Error(j.error||'Lỗi deactivate');
        await load(); select(j.id);
      }catch(e){showErr(e.message||String(e))}
    }
    async function createNew(){
      const code=prompt('Code DS mới:'); if(!code) return;
      const name=prompt('Tên DS mới:'); if(!name) return;
      clearErr();
      try{
        const body={code:code.trim(),name:name.trim(),trigger_event:'issue_date',retention_years:5,is_permanent:0,disposal_action:'destruction',confirmation_days:30,is_active:1};
        const r=await fetch(API,{method:'POST',headers:h(),body:JSON.stringify(body)});
        const j=await r.json(); if(!r.ok) throw new Error(j.error||'Lỗi tạo DS');
        await load(); select(j.id);
      }catch(e){showErr(e.message||String(e))}
    }
    function showUsing(){
      const modal=document.getElementById('modal'); const box=document.getElementById('modalContent');
      const current = state.lastConflictRecords;
      if(current.length){
        box.innerHTML=current.map(r=>'<div style="padding:6px 0;border-bottom:1px solid var(--line)"><strong>'+esc(r.record_number||r.id)+'</strong> - '+esc(r.title)+' <span class="muted">('+esc(r.state)+')</span></div>').join('');
      } else if(state.selected){
        box.innerHTML='<div class="muted">Không có dữ liệu conflict gần nhất. Thử lưu khi có records active để xem danh sách ảnh hưởng.</div>';
      } else {
        box.textContent='Chưa chọn DS.';
      }
      modal.style.display='flex';
    }

    btnSave.onclick=save; btnDeactivate.onclick=deactivate; btnCreate.onclick=createNew; btnUsing.onclick=showUsing;
    modalClose.onclick=()=>modal.style.display='none';
    window.onclick=(e)=>{if(e.target===modal) modal.style.display='none';};
    load();
  })();
  </script>
</body>
</html>
